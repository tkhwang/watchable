name: Claude Code Review

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          prompt: |
            Review this PR for:
            1. DDD pattern compliance (ValueObject, Entity, AggregateRoot)
            2. Result pattern usage (factory → Result, mutation → throw)
            3. Test coverage and naming consistency (Korean test names)
            4. TypeScript strict mode compliance
            Provide specific, actionable feedback.
